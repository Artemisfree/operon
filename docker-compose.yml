services:
  postgres:
    image: postgres:16-alpine
    container_name: operon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-operon}
      POSTGRES_USER: ${POSTGRES_USER:-operon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-operon}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-operon} -d ${POSTGRES_DB:-operon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: operon-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://operon:operon@postgres:5432/operon?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - .:/workspace
      - api-node-modules:/workspace/node_modules
      - api-app-node-modules:/workspace/apps/api/node_modules
    command: sh -c "corepack enable && pnpm install --no-frozen-lockfile && pnpm --filter @operon/api prisma:generate && pnpm --filter @operon/api prisma:migrate:deploy && pnpm --filter @operon/api dev"

volumes:
  postgres-data:
  api-node-modules:
  api-app-node-modules:
